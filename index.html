<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸我的沙龙</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
            transition: opacity 0.3s;
        }
        h1 { font-size: 2.2rem; margin-bottom: 10px; color: #fff; letter-spacing: 2px; }
        p { color: #888; font-size: 0.95rem; }
        
        /* 核心修改：限制最大宽度并调整响应式基准，确保大屏下完美一行 3 列 */
        .video-container {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            max-width: 1200px; /* 拓宽容器以容纳 3 列 */
            justify-content: center;
        }
        
        .video-card {
            width: 360px; /* 微调宽度，更适合 3 列平铺 */
            background: #1c1c1e;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: all 0.4s ease;
            cursor: pointer;
        }
        .video-card:hover:not(.expanded) {
            transform: scale(1.03) translateY(-5px);
        }
        
        .thumbnail-box {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px 8px 0 0;
        }
        
        .video-info {
            padding: 15px;
            background-color: #1c1c1e;
        }
        .video-title { font-size: 1.05rem; font-weight: 600; color: #fff; }

        /* 影院全屏模式 */
        .video-card.expanded {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border-radius: 0;
            z-index: 1000;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .video-card.expanded .thumbnail-box {
            padding-top: 0;
            width: 100%;
            height: 100%;
        }
        .video-card.expanded video {
            border-radius: 0;
            object-fit: contain;
        }
        .video-card.expanded .video-info { display: none; }

        /* 关闭按钮 */
        .close-theater {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 3rem;
            font-weight: 200;
            cursor: pointer;
            z-index: 2000;
            background: none;
            border: none;
        }
        body.mode-theater .close-theater { display: block; }
        body.mode-theater { overflow: hidden; }
        body.mode-theater header { opacity: 0; } 
    </style>
</head>
<body>

    <button class="close-theater" onclick="exitTheaterMode()">&times;</button>

    <header>
        <h1>揉合生命千樣好 攝入相簿</h1>
        <p>留住温度 速度 温柔和憤怒</p> <!-- 下方小字 -->
    </header>

    <!-- 所有视频卡片现在都在这个正确的全局 video-container 内部 -->
    <div class="video-container">
        
        <!-- 视频 1 -->
        <div class="video-card" id="card_video1" data-router="video1" onclick="navigateToVideo('video1')">
            <div class="thumbnail-box">
                <video id="v_video1" preload="metadata" playsinline muted>
                    <source src="video1.mp4" type="video/mp4">
                </video>
            </div>
            <div class="video-info">
                <div class="video-title">video1</div>
            </div>
        </div>

        <!-- 视频 2 -->
        <div class="video-card" id="card_video2" data-router="video2" onclick="navigateToVideo('video2')">
            <div class="thumbnail-box">
                <video id="v_video2" preload="metadata" playsinline muted>
                    <source src="video2.mp4" type="video/mp4">
                </video>
            </div>
            <div class="video-info">
                <div class="video-title">video2</div>
            </div>
        </div>

        <!-- 视频 3 -->
        <div class="video-card" id="card_video3" data-router="video3" onclick="navigateToVideo('video3')">
            <div class="thumbnail-box">
                <video id="v_video3" preload="metadata" playsinline muted>
                    <source src="video3.mp4" type="video/mp4">
                </video>
            </div>
            <div class="video-info">
                <div class="video-title">video3</div>
            </div>
        </div>

        <!-- 视频 4 -->
        <div class="video-card" id="card_video4" data-router="video4" onclick="navigateToVideo('video4')">
            <div class="thumbnail-box">
                <video id="v_video4" preload="metadata" playsinline muted>
                    <source src="video4.mp4" type="video/mp4">
                </video>
            </div>
            <div class="video-info">
                <div class="video-title">video4</div>
            </div>
        </div>

        <!-- 视频 5 -->
        <div class="video-card" id="card_video5" data-router="video5" onclick="navigateToVideo('video5')">
            <div class="thumbnail-box">
                <video id="v_video5" preload="metadata" playsinline muted>
                    <source src="video5.mp4" type="video/mp4">
                </video>
            </div>
            <div class="video-info">
                <div class="video-title">video5</div>
            </div>
        </div>

        <!-- 视频 6：新增加的位置 -->
        <div class="video-card" id="card_video6" data-router="video6" onclick="navigateToVideo('video6')">
            <div class="thumbnail-box">
                <video id="v_video6" preload="metadata" playsinline muted>
                    <source src="video6.mp4" type="video/mp4">
                </video>
            </div>
            <div class="video-info">
                <div class="video-title">video6</div>
            </div>
        </div>

    </div> <!-- video-container 在这里统一关闭 -->

    <script>
        let currentOpenVideoId = null;

        function navigateToVideo(videoRouterName) {
            window.location.hash = '/' + videoRouterName;
        }

        function exitTheaterMode() {
            window.location.hash = '';
        }

        function handleRouting() {
            const hash = window.location.hash; 
            
            if (!hash || hash === '#/') {
                if (currentOpenVideoId) {
                    const card = document.getElementById('card_' + currentOpenVideoId);
                    const video = document.getElementById('v_' + currentOpenVideoId);
                    
                    document.body.classList.remove('mode-theater');
                    if (card) card.classList.remove('expanded');
                    if (video) {
                        video.pause();
                        video.controls = false;
                        video.muted = true;
                    }
                    currentOpenVideoId = null;
                }
                return;
            }

            const routerName = hash.replace('#/', '');
            const card = document.getElementById('card_' + routerName);
            const video = document.getElementById('v_' + routerName);

            if (!card || !video) {
                window.location.hash = '';
                return;
            }

            document.body.classList.add('mode-theater');
            card.classList.add('expanded');
            video.controls = true;
            video.muted = false;
            video.play();
            currentOpenVideoId = routerName;
        }

        window.addEventListener('hashchange', handleRouting);
        window.addEventListener('load', handleRouting);

        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                exitTheaterMode();
            }
        });
    </script>

</body>
</html>
