<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的人生回味片段</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
            transition: opacity 0.3s;
        }
        h1 { font-size: 2.2rem; margin-bottom: 10px; color: #fff; letter-spacing: 2px; }
        p { color: #888; font-size: 0.95rem; }
        
        .video-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            max-width: 900px;
            justify-content: center;
        }
        
        .video-card {
            width: 380px;
            background: #1c1c1e;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: all 0.4s ease;
            cursor: pointer;
        }
        .video-card:hover:not(.expanded) {
            transform: scale(1.03) translateY(-5px);
        }
        
        .thumbnail-box {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px 8px 0 0;
        }
        
        .video-info {
            padding: 15px;
            background-color: #1c1c1e;
        }
        .video-title { font-size: 1.05rem; font-weight: 600; color: #fff; }

        /* 影院全屏模式 */
        .video-card.expanded {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border-radius: 0;
            z-index: 1000;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .video-card.expanded .thumbnail-box {
            padding-top: 0;
            width: 100%;
            height: 100%;
        }
        .video-card.expanded video {
            border-radius: 0;
            object-fit: contain;
        }
        .video-card.expanded .video-info { display: none; }

        /* 关闭按钮 */
        .close-theater {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 3rem;
            font-weight: 200;
            cursor: pointer;
            z-index: 2000;
            background: none;
            border: none;
        }
        body.mode-theater .close-theater { display: block; }
        body.mode-theater { overflow: hidden; }
        body.mode-theater header { opacity: 0; } /* 全屏时隐藏头部，防止穿帮 */
    </style>
</head>
<body>

    <button class="close-theater" onclick="exitTheaterMode()">&times;</button>

    <header>
        <h1>揉合生命千樣好 攝入相簿</h1>
        <p> </p> //下方小字
    </header>

    <div class="video-container">
        <!-- 视频 1：注意看这里的 data-router="video1" -->
        <div class="video-card" id="card_video1" data-router="video1" onclick="navigateToVideo('video1')">
            <div class="thumbnail-box">
                <video id="v_video1" preload="metadata" playsinline muted>
                    <source src="video1.mp4" type="video/mp4">
                </video>
            </div>
            <div class="video-info">
                <div class="video-title">video1</div> //video1命名
            </div>
        </div>

        <!-- 视频 2：data-router="video2" -->
        <div class="video-card" id="card_video2" data-router="video2" onclick="navigateToVideo('video2')">
            <div class="thumbnail-box">
                <video id="v_video2" preload="metadata" playsinline muted>
                    <source src="video2.mp4" type="video/mp4">
                </video>
            </div>
            <div class="video-info">
                <div class="video-title">video2</div>  ////video2命名
            </div>
        </div>
    </div>

    <script>
        let currentOpenVideoId = null;

        // 用户点击封面时触发：改变网址
        function navigateToVideo(videoRouterName) {
            // 这行代码会改变浏览器的网址，触发下面的路由监听器
            window.location.hash = '/' + videoRouterName;
        }

        // 用户点击关闭按钮时触发：清空网址
        function exitTheaterMode() {
            window.location.hash = '';
        }

        // 核心路由中央处理器：专门负责盯死网址栏
        function handleRouting() {
            const hash = window.location.hash; // 获取当前网址的 #/xxxx 部分
            
            // 1. 如果网址是空的（或者只有#），说明是首页状态，关闭所有全屏
            if (!hash || hash === '#/') {
                if (currentOpenVideoId) {
                    const card = document.getElementById('card_' + currentOpenVideoId);
                    const video = document.getElementById('v_' + currentOpenVideoId);
                    
                    document.body.classList.remove('mode-theater');
                    if (card) card.classList.remove('expanded');
                    if (video) {
                        video.pause();
                        video.controls = false;
                        video.muted = true;
                    }
                    currentOpenVideoId = null;
                }
                return;
            }

            // 2. 如果网址形如 #/video1，解析出其中的 'video1'
            const routerName = hash.replace('#/', '');
            const card = document.getElementById('card_' + routerName);
            const video = document.getElementById('v_' + routerName);

            // 防错机制：如果用户在网址乱打字，找不到对应的视频，就直接退回首页
            if (!card || !video) {
                window.location.hash = '';
                return;
            }

            // 3. 执行全屏播放逻辑
            document.body.classList.add('mode-theater');
            card.classList.add('expanded');
            video.controls = true;
            video.muted = false;
            video.play();
            currentOpenVideoId = routerName;
        }

        // 让浏览器死死盯住网址的变化，只要网址一变，立刻执行 handleRouting
        window.addEventListener('hashchange', handleRouting);
        
        // 网页第一次加载时，也要检查一次网址（实现直达特定视频功能）
        window.addEventListener('load', handleRouting);

        // 允许按 Esc 键退出
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                exitTheaterMode();
            }
        });
    </script>

</body>
</html>
